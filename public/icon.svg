<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0f0f0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <!-- Left weight plate -->
  <rect x="100" y="196" width="40" height="120" rx="10" fill="url(#accent)"/>
  <rect x="80" y="216" width="20" height="80" rx="6" fill="url(#accent)" opacity="0.7"/>
  <!-- Right weight plate -->
  <rect x="372" y="196" width="40" height="120" rx="10" fill="url(#accent)"/>
  <rect x="412" y="216" width="20" height="80" rx="6" fill="url(#accent)" opacity="0.7"/>
  <!-- Bar -->
  <rect x="140" y="244" width="232" height="24" rx="12" fill="url(#accent)"/>
  <!-- Link symbol (two interlocking arcs below) -->
  <path d="M206 340 a30 30 0 0 1 30-30 h40 a30 30 0 0 1 0 60 h-10" fill="none" stroke="#4ade80" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <path d="M306 370 a30 30 0 0 1 -30 30 h-40 a30 30 0 0 1 0-60 h10" fill="none" stroke="#4ade80" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
</svg>
