<!-- Offline Banner -->
<div class="offline-banner" [class.visible]="!connectivity.isOnline()">
  Offline — changes will sync when reconnected
</div>

<!-- Main Content -->
<main class="app-content" [class.has-nav]="auth.isAuthenticated()">
  <router-outlet />
</main>

<!-- Install Banner -->
@if (pwaInstall.shouldShowPrompt(0)) {
  <app-install-banner
    (installClicked)="onInstallClicked()"
    (dismissed)="onInstallDismissed()"
  />
}

<!-- Bottom Navigation -->
@if (auth.isAuthenticated()) {
  <nav class="bottom-nav">
    <a routerLink="/today" routerLinkActive="active" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
      <span>Today</span>
    </a>
    <a routerLink="/plan" routerLinkActive="active" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/></svg>

    <a routerLink="/progress" routerLinkActive="active" class="nav-item">
